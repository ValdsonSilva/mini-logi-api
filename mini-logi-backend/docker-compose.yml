services:
  app:
    build:
      context: .
      target: development

    container_name: mini-logi-api
    init: true

    command: >
      sh -c "pnpm prisma:migrate:deploy && pnpm dev"

    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://mini_logi:mini_logi@postgres:5432/mini_logi?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info

    ports:
      - "3333:3333"

    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3333/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: mini-logi-postgres

    environment:
      POSTGRES_DB: mini_logi
      POSTGRES_USER: mini_logi
      POSTGRES_PASSWORD: mini_logi

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mini_logi -d mini_logi" ]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mini-logi-redis

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10

    restart: unless-stopped

volumes:
  app_node_modules:
  postgres_data:
  redis_data:
